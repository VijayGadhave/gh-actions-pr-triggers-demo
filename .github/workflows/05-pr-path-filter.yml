name: 05 - PR Path Filter (src/ only)

on:
  pull_request:
    paths:
      - 'src/**'

jobs:
  pr-path-filter-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Confirm Source Code Change in PR
        run: |
          echo "========================================="
          echo "  PR PATH FILTER TRIGGERED!"
          echo "========================================="
          echo ""
          echo "PR changes include files in src/"
          echo "Source Branch : ${{ github.head_ref }}"
          echo "Target Branch : ${{ github.base_ref }}"